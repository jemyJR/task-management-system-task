name: Check PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR Title
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          echo "Checking PR title: $PR_TITLE"

          # Allowed types
          TYPES="feature|bug-fix|refactor|docs|style|test|chore|perf|build|ci"

          # Regex for format: {type}(JIRA_ID): summary
          PR_REGEX="^($TYPES)\([a-z0-9]+\):\s.+$"

          if [[ ! "$PR_TITLE" =~ $PR_REGEX ]]; then
            echo "❌ ERROR: PR title '$PR_TITLE' does not match the convention '{type}(JIRA_ID): summary'."
            echo "Example: feature(PROJ-123): add jwt auth strategy"
            echo "Allowed types: $TYPES"
            echo "JIRA ID must be lowercase alphanumeric characters followed by a hyphen and numbers."
            exit 1
          fi
          echo "✅ PR title is valid!"
