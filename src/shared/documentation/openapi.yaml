openapi: 3.0.0
info:
  title: Task Management API Documentation
  version: 1.0.0
  description: |
    API documentation for Task Management platform.
  contact:
    name: Task Management API Support

servers:
  - url: /api/v1
    description: API server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UserId:
      in: path
      name: id
      required: true
      schema:
        type: string
        pattern: "^[0-9a-fA-F]{24}$"
      description: MongoDB user ID
    ProjectId:
      in: path
      name: id
      required: true
      schema:
        type: string
        pattern: "^[0-9a-fA-F]{24}$"
      description: MongoDB project ID
    TaskId:
      in: path
      name: id
      required: true
      schema:
        type: string
        pattern: "^[0-9a-fA-F]{24}$"
      description: MongoDB task ID

security:
  - bearerAuth: []
